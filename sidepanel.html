<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebLoop</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">R</div>
        <div>
          <h1>WebLoop</h1>
          <p>录一次，自动填表、筛选、下载和通知。</p>
        </div>
      </div>
      <button id="refreshBtn" class="icon-btn" title="刷新">↻</button>
    </header>

    <section id="statusHero" class="status-hero">
      <div class="pulse-dot"></div>
      <div>
        <strong id="heroTitle">准备就绪</strong>
        <span id="heroSub">Open the target web app page后开始录制。</span>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-view="today">今日</button>
      <button class="tab" data-view="builder">录制</button>
      <button class="tab" data-view="tasks">任务</button>
      <button class="tab" data-view="logs">日志</button>
      <button class="tab" data-view="settings">设置</button>
    </nav>

    <section id="viewToday" class="view active"></section>
    <section id="viewBuilder" class="view"></section>
    <section id="viewTasks" class="view"></section>
    <section id="viewLogs" class="view"></section>
    <section id="viewSettings" class="view"></section>
  </main>

  <div id="toast" class="toast"></div>

  <template id="emptyTodayTemplate">
    <div class="empty-card">
      <div class="empty-icon">⬇</div>
      <h2>创建第一个自动任务</h2>
      <p>Open the target web app page，录制一次真实操作。以后可以自动填条件、查询、下载或提交，并在完成后通知。</p>
      <button class="primary wide" data-action="create-draft">开始录制当前页面</button>
    </div>
  </template>

  <script src="sidepanel.js"></script>
</body>
</html>
