<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 110 H1280 M0 220 H1280 M0 330 H1280"/>
    <path d="M160 0 V440 M320 0 V440 M480 0 V440 M640 0 V440 M800 0 V440 M960 0 V440 M1120 0 V440"/>
  </g>

  <!-- left: copy -->
  <g transform="translate(80,96)">
    <g>
      <rect width="56" height="56" rx="16" fill="url(#logo)"/>
      <text x="28" y="38" font-size="30" font-weight="800" fill="#0b1220" text-anchor="middle" letter-spacing="-1">W</text>
      <text x="74" y="38" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-1">WebLoop</text>
    </g>
    <text x="0" y="120" font-size="50" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Record once. Automate forever.</text>
    <text x="0" y="166" font-size="21" fill="#cbd5e1">No-code, local-first browser automation for the web apps</text>
    <text x="0" y="196" font-size="21" fill="#cbd5e1">that never got an API — ERPs, CRMs, intranets &amp; reports.</text>

    <g transform="translate(0,232)" font-size="15" font-weight="600">
      <g><rect width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/><text x="75" y="24" fill="#e2e8f0" text-anchor="middle">⏺ Record</text></g>
      <g transform="translate(162,0)"><rect width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/><text x="75" y="24" fill="#e2e8f0" text-anchor="middle">▶ Replay</text></g>
      <g transform="translate(324,0)"><rect width="160" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/><text x="80" y="24" fill="#e2e8f0" text-anchor="middle">⏱ Schedule</text></g>
    </g>
    <g transform="translate(0,282)" font-size="15" font-weight="600">
      <g><rect width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/><text x="75" y="24" fill="#e2e8f0" text-anchor="middle">🔔 Notify</text></g>
      <g transform="translate(162,0)"><rect width="178" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/><text x="89" y="24" fill="#e2e8f0" text-anchor="middle">🔒 Local-first</text></g>
    </g>
  </g>

  <!-- right: side panel mock -->
  <g transform="translate(880,52)" filter="url(#shadow)">
    <rect width="320" height="336" rx="20" fill="url(#panel)"/>
    <!-- topbar -->
    <g transform="translate(20,20)">
      <rect width="30" height="30" rx="10" fill="#111827"/>
      <text x="15" y="21" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">W</text>
      <text x="42" y="16" font-size="14" font-weight="700" fill="#111827">WebLoop</text>
      <text x="42" y="30" font-size="9" fill="#667085">Record once, automate.</text>
    </g>
    <!-- status hero -->
    <g transform="translate(20,64)">
      <rect width="280" height="46" rx="14" fill="#ffffff" stroke="#edf0f4"/>
      <circle cx="22" cy="23" r="5" fill="#07824a"/>
      <text x="38" y="20" font-size="11" font-weight="700" fill="#111827">Tasks ready</text>
      <text x="38" y="34" font-size="9.5" fill="#667085">3 enabled tasks · 2/3 done today</text>
    </g>
    <!-- tabs -->
    <g transform="translate(20,122)" font-size="10" font-weight="600">
      <rect width="58" height="24" rx="8" fill="#111827"/><text x="29" y="16" fill="#fff" text-anchor="middle">Today</text>
      <text x="76" y="16" fill="#667085">Record</text>
      <text x="128" y="16" fill="#667085">Tasks</text>
      <text x="176" y="16" fill="#667085">Logs</text>
      <text x="222" y="16" fill="#667085">Perms</text>
    </g>
    <!-- task card -->
    <g transform="translate(20,158)">
      <rect width="280" height="158" rx="16" fill="#ffffff" stroke="#edf0f4"/>
      <text x="16" y="26" font-size="12" font-weight="700" fill="#111827">Sales daily report</text>
      <text x="16" y="42" font-size="9" fill="#667085">erp.acme.com/report</text>
      <rect x="218" y="14" width="48" height="20" rx="10" fill="#eaf8f0"/><text x="242" y="28" font-size="9" font-weight="700" fill="#07824a" text-anchor="middle">Done</text>
      <line x1="16" y1="56" x2="264" y2="56" stroke="#edf0f4"/>
      <g font-size="9" fill="#667085">
        <text x="16" y="76">Trigger</text><text x="16" y="92" font-size="10" font-weight="700" fill="#111827">Workdays 09:00</text>
        <text x="150" y="76">Steps</text><text x="150" y="92" font-size="10" font-weight="700" fill="#111827">12 steps</text>
      </g>
      <g transform="translate(16,108)">
        <rect width="74" height="30" rx="10" fill="#eff6ff"/><text x="37" y="20" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">Run now</text>
        <rect x="84" width="64" height="30" rx="10" fill="#f1f5f9"/><text x="116" y="20" font-size="10" font-weight="600" fill="#111827" text-anchor="middle">Edit</text>
        <rect x="156" width="74" height="30" rx="10" fill="#ffffff" stroke="#e5e7eb"/><text x="193" y="20" font-size="10" font-weight="600" fill="#667085" text-anchor="middle">Pause</text>
      </g>
    </g>
  </g>
</svg>
